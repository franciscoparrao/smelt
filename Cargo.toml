[package]
name = "smelt-ml"
version = "0.4.0"
edition = "2024"
authors = ["Francisco Parra <francisco.parra.o@usach.cl>"]
description = "A machine learning framework for Rust, inspired by mlr3"
license = "MIT"
repository = "https://github.com/franciscoparrao/smelt"
keywords = ["machine-learning", "classification", "regression", "ml", "data-science"]
categories = ["science", "algorithms"]
readme = "README.md"

[dependencies]
ndarray = { version = "0.16", features = ["serde"] }
rand = "0.9"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
csv = "1"
rayon = "1.10"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3"

[[bench]]
name = "learners"
harness = false
