name: Build and publish wheels

# Build abi3 binary wheels for Windows, macOS and Linux so that
# `pip install smelt-ml` never needs a Rust toolchain or a C++ linker.
# abi3-py38 means ONE wheel per platform works for CPython 3.8+.
#
# Triggers:
#   - push of a tag like v0.4.2  -> test + build + publish to PyPI
#   - manual dispatch            -> test + build only (artifacts), no publish
#
# The `test` job runs the full Rust suite AT THE TAGGED REF and gates
# `publish` (audit 5a, HIGH-1): ci.yml only runs on push/PR to branches,
# so without this gate a tag could publish wheels from a red tree.
#
# Actions are pinned by commit SHA (tag in the trailing comment) so a
# moved/compromised tag can't silently change what runs — this workflow
# handles a PyPI credential.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

# The pyproject.toml lives in smelt-py/ (workspace member). maturin-action
# is pointed there via `working-directory`; the parent crate (path dep) is
# still on disk because the whole repo is checked out.
env:
  MATURIN_DIR: smelt-py
  CARGO_TERM_COLOR: always

jobs:
  # Same suite ci.yml runs on push/PR, replicated here so it executes on
  # the tagged ref itself and blocks `publish` if red.
  test:
    name: cargo test (gate for publish)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable branch (2026-07-17)
        with:
          # Pinned by SHA, so the ref name no longer selects the toolchain;
          # this input does instead.
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-test
      - run: cargo test
      - run: cargo test --features parquet

  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: ${{ env.MATURIN_DIR }}
          target: ${{ matrix.target }}
          manylinux: "2014"   # == manylinux_2_17, broad compatibility
          args: --release --out dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheels-linux-${{ matrix.target }}
          path: smelt-py/dist

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: ${{ env.MATURIN_DIR }}
          target: x64
          args: --release --out dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheels-windows-x64
          path: smelt-py/dist

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: ${{ env.MATURIN_DIR }}
          target: ${{ matrix.target }}
          args: --release --out dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheels-macos-${{ matrix.target }}
          path: smelt-py/dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: ${{ env.MATURIN_DIR }}
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheels-sdist
          path: smelt-py/dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    # Only publish on a version tag, after the test suite passes on that
    # ref AND every build succeeds.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, linux, windows, macos, sdist]
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        # RECOMMENDED FOLLOW-UP: migrate to PyPI "trusted publishing"
        # (OIDC) and drop the long-lived PYPI_API_TOKEN secret entirely —
        # configure the publisher on pypi.org (project -> Publishing),
        # then replace `password:` with `permissions: id-token: write` on
        # this job. Not done here because it needs configuration on the
        # PyPI side first.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1 branch (2026-07-17)
        with:
          packages-dir: dist
          # Add a repository secret named PYPI_API_TOKEN
          # (GitHub repo -> Settings -> Secrets and variables -> Actions).
          # Generate the token at https://pypi.org/manage/account/token/
          password: ${{ secrets.PYPI_API_TOKEN }}
