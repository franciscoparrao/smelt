name: CI

# Tests + lint on every push/PR. Before this workflow existed the 584-test
# suite only ran when someone ran it locally, and a tag could publish
# wheels to PyPI (release.yml) from a red tree.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: cargo test (default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  test-parquet:
    name: cargo test --features parquet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: parquet
      - run: cargo test --features parquet

  lint:
    name: clippy (workspace, deny warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: lint
      # Enforcing since 2026-07-17: the legacy --all-targets debt (tests +
      # examples + smelt-py) was paid down to zero, so any new warning is a
      # regression. --workspace also compiles smelt-py against the parent
      # crate's API, which is what the old `cargo check -p smelt-py` step
      # was for.
      - run: cargo clippy --workspace --all-targets -- -D warnings
