[package]
name = "smelt-py"
version = "0.3.0"
edition = "2024"
authors = ["Francisco Parra <francisco.parra.o@usach.cl>"]
description = "Python bindings for smelt-ml (Rust ML framework)"
license = "MIT"

[lib]
name = "_smelt"
crate-type = ["cdylib"]

[dependencies]
smelt-ml = { path = ".." }
pyo3 = { version = "0.24", features = ["extension-module"] }
numpy = "0.24"
ndarray = "0.16"
